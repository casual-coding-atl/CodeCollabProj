name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build first: the TanStack Router plugin generates src/routeTree.gen.ts
      # (gitignored) during the build, and the type check depends on it.
      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

  e2e:
    name: Critical E2E
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/codecollab_e2e
      JWT_SECRET: e2e-test-secret-at-least-32-characters-1234
      VITE_API_URL: /api
      E2E_EMAIL: e2e@codecollab.test
      E2E_PASSWORD: e2e-password-123
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Seed E2E database
        run: node scripts/seed-e2e.mjs

      - name: Run critical E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
